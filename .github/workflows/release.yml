name: Release – Raspberry Pi Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-and-release:
    name: Build Pi tarball & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Stage runtime files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKG="trading-bot-pi-${VERSION}"
          mkdir -p "${PKG}"

          # Core runtime files
          cp trading_bot.py get_data.py predict_catboost.py \
             get_account_balance.py data_preperation.py \
             go_no_go_scorecard.py research_signal.py \
             analyze_trade_journal.py \
             requirements.txt requirements-pi.txt \
             "${PKG}/"

          # Scripts & deploy (installer + systemd units)
          mkdir -p "${PKG}/scripts" "${PKG}/deploy"
          cp scripts/run_weekly_scorecard.sh \
             scripts/start_sim_bot.sh \
             scripts/stop_sim_bot.sh \
             scripts/install_pi.sh \
             "${PKG}/scripts/"
          cp deploy/trading-bot.service \
             deploy/scorecard.service \
             deploy/scorecard.timer \
             "${PKG}/deploy/"

          # .env template (keep .env itself out of the package)
          if [[ -f ".env.example" ]]; then
            cp .env.example "${PKG}/"
          fi

          # Archive
          tar -czf "${PKG}.tar.gz" "${PKG}/"
          sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"

          echo "PKG=${PKG}" >> "$GITHUB_ENV"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cat <<EOF > release_notes.md
          ## Crypto Trading Bot ${VERSION}

          ### Raspberry Pi Quick Install

          Download and run the installer on your Pi (as root):

          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${VERSION}/install_pi.sh | sudo bash -s -- ${VERSION}
          \`\`\`

          Or manually:

          \`\`\`bash
          # 1. Download the package
          curl -LO https://github.com/${{ github.repository }}/releases/download/${VERSION}/trading-bot-pi-${VERSION}.tar.gz
          # 2. Verify checksum
          curl -LO https://github.com/${{ github.repository }}/releases/download/${VERSION}/trading-bot-pi-${VERSION}.tar.gz.sha256
          sha256sum -c trading-bot-pi-${VERSION}.tar.gz.sha256
          # 3. Extract
          tar -xzf trading-bot-pi-${VERSION}.tar.gz
          # 4. Run installer
          sudo bash scripts/install_pi.sh ${VERSION}
          \`\`\`

          ### After installation
          1. Edit \`/opt/trading_2/.env\` – set your API keys.
          2. \`sudo systemctl start trading-bot\`
          3. \`sudo journalctl -u trading-bot -f\`

          ### What's included
          - Runtime Python scripts
          - Pi-optimised \`requirements-pi.txt\`
          - Systemd service & timer units (\`deploy/\`)
          - One-shot installer (\`scripts/install_pi.sh\`)
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "Crypto Trading Bot ${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          files: |
            ${{ env.PKG }}.tar.gz
            ${{ env.PKG }}.tar.gz.sha256
            scripts/install_pi.sh
