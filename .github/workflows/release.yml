name: Release – Raspberry Pi Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (example: v1.0.19)'
        required: true
        type: string
      prerelease:
        description: 'Mark release as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-and-release:
    name: Build Pi tarball & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release metadata
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_VERSION="${{ github.event.inputs.version }}"
            [[ "$INPUT_VERSION" == v* ]] || INPUT_VERSION="v${INPUT_VERSION}"
            echo "VERSION=${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
            echo "PRERELEASE=${{ github.event.inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage runtime files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKG="trading-bot-pi-${VERSION}"
          mkdir -p "${PKG}"

          # Core runtime files
          cp trading_bot.py get_data.py predict_catboost.py \
             get_account_balance.py data_preperation.py \
             go_no_go_scorecard.py research_signal.py \
             analyze_trade_journal.py \
             requirements.txt requirements-pi.txt \
             "${PKG}/"

          # Documentation and env templates used at runtime on Pi
           cp README.md SERVER_README.md .env.example .env.live.example "${PKG}/"

          # Scripts & deploy (installer + systemd units)
          mkdir -p "${PKG}/scripts" "${PKG}/deploy"
          cp scripts/run_weekly_scorecard.sh \
             scripts/run_node_exporter_textfile_example.sh \
             scripts/start_sim_bot.sh \
             scripts/stop_sim_bot.sh \
             scripts/install_pi.sh \
             scripts/install_monitoring_pi.sh \
             scripts/check_autoresearch_setup.sh \
             scripts/update_autoresearch_signal.py \
             scripts/fetch_research_signal.py \
             "${PKG}/scripts/"
          cp deploy/trading-bot.service \
             deploy/scorecard.service \
             deploy/scorecard.timer \
             deploy/scorecard-status.service \
             deploy/scorecard-status.timer \
             deploy/node-exporter-textfile.service \
             deploy/prometheus.yml \
             deploy/trading-alerts.yml \
             deploy/grafana-datasource.yml \
             deploy/grafana-dashboard.json \
             deploy/grafana-dashboard-provisioning.yml \
             deploy/grafana-memory-limit.conf \
             deploy/research-signal.service \
             deploy/research-signal.timer \
             "${PKG}/deploy/"

          # Release metadata inside package
          cat > "${PKG}/version.txt" <<EOF
          version=${VERSION}
          build_date=$(date -Iseconds)
          build_host=github-actions
          git_commit=${GITHUB_SHA}
          EOF

          # CatBoost model – decision engine for buy/sell signals
          if [[ -d "model/catboost_trading_model" ]]; then
            mkdir -p "${PKG}/model"
            cp -r model/catboost_trading_model "${PKG}/model/"
          fi

          # Ensure result/log/data scaffolding exists on first install
          mkdir -p "${PKG}/results/scorecards" "${PKG}/logs" "${PKG}/data"

          # Release-blocking sanity checks before creating archive
          required_files=(
            "${PKG}/trading_bot.py"
            "${PKG}/predict_catboost.py"
            "${PKG}/research_signal.py"
            "${PKG}/scripts/install_pi.sh"
            "${PKG}/scripts/install_monitoring_pi.sh"
            "${PKG}/deploy/prometheus.yml"
            "${PKG}/deploy/scorecard-status.timer"
            "${PKG}/deploy/research-signal.service"
            "${PKG}/deploy/research-signal.timer"
            "${PKG}/version.txt"
          )
          for required in "${required_files[@]}"; do
            [[ -e "$required" ]] || { echo "Missing staged file: $required"; exit 1; }
          done

          # Archive
          tar -czf "${PKG}.tar.gz" "${PKG}/"

          # Verify required files are also present in the final archive
          for required in "${required_files[@]}"; do
            if ! tar -tzf "${PKG}.tar.gz" "$required" >/dev/null 2>&1; then
              echo "Missing required file in archive: $required"
              exit 1
            fi
          done

          sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"

          echo "PKG=${PKG}" >> "$GITHUB_ENV"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CUSTOM_NOTES_SOURCE="release_notes/${VERSION}.txt"
          PREV_TAG="$(git tag --list 'v*' --sort=-version:refname | grep -vx "${VERSION}" | head -1 || true)"

          if [[ -n "$PREV_TAG" ]]; then
            CHANGE_RANGE="${PREV_TAG}..HEAD"
            COMMITS="$(git --no-pager log --pretty='- %h %s' ${CHANGE_RANGE} | head -20 || true)"
            CHANGED_FILES="$(git --no-pager diff --name-only ${CHANGE_RANGE} | sed 's/^/- /' | head -40 || true)"
          else
            CHANGE_RANGE="HEAD"
            COMMITS="$(git --no-pager log -1 --pretty='- %h %s' HEAD || true)"
            CHANGED_FILES="$(git --no-pager show --pretty='' --name-only HEAD | sed 's/^/- /' | sed '/^- $/d' | head -40 || true)"
          fi

          if [[ -z "$COMMITS" ]]; then
            COMMITS="- No commit summary available."
          fi
          if [[ -z "$CHANGED_FILES" ]]; then
            CHANGED_FILES="- No file list available."
          fi

          HIGHLIGHTS="$(printf '%s\n' "$COMMITS" | sed '/^$/d' | head -6)"
          if [[ -z "$HIGHLIGHTS" ]]; then
            HIGHLIGHTS="- No highlights available."
          fi

          OPERATIONAL_IMPACT="- Review the highlights above before rollout; they summarize the release delta.
          - Validate the changed components below in the target environment after deployment."
          if printf '%s\n' "$CHANGED_FILES" | grep -Eq 'grafana|prometheus|scorecard|run_weekly_scorecard|go_no_go_scorecard'; then
            OPERATIONAL_IMPACT="${OPERATIONAL_IMPACT}
          - Monitoring and scorecard outputs changed; confirm dashboards and exported metrics refresh as expected."
          fi
          if printf '%s\n' "$CHANGED_FILES" | grep -Eq 'trading_bot|predict|research_signal|model/'; then
            OPERATIONAL_IMPACT="${OPERATIONAL_IMPACT}
          - Runtime trading behavior or model packaging changed; validate the deployed bot before enabling live execution."
          fi

          VERIFICATION_CHECKLIST="- Release assets download successfully and checksum verification passes."
          if printf '%s\n' "$CHANGED_FILES" | grep -Eq 'scorecard|run_weekly_scorecard|go_no_go_scorecard'; then
            VERIFICATION_CHECKLIST="${VERIFICATION_CHECKLIST}
          - Scorecard services/timers run successfully and refresh status outputs after deployment."
          fi
          if printf '%s\n' "$CHANGED_FILES" | grep -Eq 'grafana|prometheus|scorecard-status|node-exporter'; then
            VERIFICATION_CHECKLIST="${VERIFICATION_CHECKLIST}
          - Prometheus exports update and Grafana panels show the expected current values."
          fi
          if printf '%s\n' "$CHANGED_FILES" | grep -Eq 'trading_bot|predict|research_signal|model/'; then
            VERIFICATION_CHECKLIST="${VERIFICATION_CHECKLIST}
          - Trading bot startup and logs look healthy in the intended runtime profile."
          fi

          NOTES_SECTION="- Review the changed components before rolling out to production."
          if [[ "$VERSION" == *-rc* ]]; then
            NOTES_SECTION="${NOTES_SECTION}
          - This is a release candidate. Keep production safeguards enabled."
          fi
          NOTES_SECTION="${NOTES_SECTION}
          - Revoke and rotate any credentials that may have been exposed in logs, terminals, or chat history."

          cat <<EOF > release_body.md
          ## Crypto Trading Bot ${VERSION}

          ### Highlights

          ${HIGHLIGHTS}

          ### Notes Asset

          Detailed notes are attached as \`release-notes-${VERSION}.txt\`.

          ### Raspberry Pi Quick Install

          Download and run the installer on your Pi (as root):

          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${VERSION}/install_pi.sh | sudo bash -s -- ${VERSION}
          \`\`\`

          Or manually:

          \`\`\`bash
          # 1. Download the package
          curl -LO https://github.com/${{ github.repository }}/releases/download/${VERSION}/trading-bot-pi-${VERSION}.tar.gz
          # 2. Verify checksum
          curl -LO https://github.com/${{ github.repository }}/releases/download/${VERSION}/trading-bot-pi-${VERSION}.tar.gz.sha256
          sha256sum -c trading-bot-pi-${VERSION}.tar.gz.sha256
          # 3. Extract
          tar -xzf trading-bot-pi-${VERSION}.tar.gz
          # 4. Run installer
          sudo bash scripts/install_pi.sh ${VERSION}
          \`\`\`

          ### After installation

          1. Edit \`/opt/trading_2/.env\` – set your API keys.
          2. \`sudo systemctl start trading-bot\`
          3. \`sudo journalctl -u trading-bot -f\`

          ### What's included

          - Runtime Python scripts
          - Pi-optimised \`requirements-pi.txt\`
          - Systemd service & timer units (\`deploy/\`)
          - One-shot installer (\`scripts/install_pi.sh\`)

          EOF

          if [[ -f "$CUSTOM_NOTES_SOURCE" ]]; then
            cp "$CUSTOM_NOTES_SOURCE" "release-notes-${VERSION}.txt"
          else
          cat <<EOF > release-notes-${VERSION}.txt
          Trading Bot Pi Release Notes - ${VERSION}

          Date: $(date -I)

          Highlights

          ${HIGHLIGHTS}

          Operational Impact

          ${OPERATIONAL_IMPACT}

          Changed Components

          ${CHANGED_FILES}

          Verification Checklist

          ${VERIFICATION_CHECKLIST}

          Notes

          ${NOTES_SECTION}
          EOF
          fi

          echo "NOTES_FILE=release-notes-${VERSION}.txt" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          target_commitish: ${{ github.sha }}
          name: "Crypto Trading Bot ${{ steps.version.outputs.VERSION }}"
          prerelease: ${{ steps.version.outputs.PRERELEASE }}
          body_path: release_body.md
          files: |
            ${{ env.PKG }}.tar.gz
            ${{ env.PKG }}.tar.gz.sha256
            scripts/install_pi.sh
            ${{ env.NOTES_FILE }}
