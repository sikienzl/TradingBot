name: Weekly Scorecard

on:
  schedule:
    # Every Monday at 05:15 UTC
    - cron: "15 5 * * 1"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Lookback window in days"
        required: true
        default: "7"
      starting_capital:
        description: "Starting capital used for drawdown %"
        required: true
        default: "20"
      min_closed_trades:
        description: "Minimum closed trades"
        required: true
        default: "200"
      min_win_rate:
        description: "Minimum win rate in percent"
        required: true
        default: "45"
      min_profit_factor:
        description: "Minimum profit factor"
        required: true
        default: "1.2"
      min_avg_pnl:
        description: "Minimum average PnL per sell"
        required: true
        default: "0.0"
      max_drawdown_pct:
        description: "Maximum drawdown percent"
        required: true
        default: "10"
      fail_on_hold:
        description: "Fail this workflow when verdict is HOLD"
        type: boolean
        required: true
        default: false
      fail_on_nogo:
        description: "Fail this workflow when verdict is NO-GO"
        type: boolean
        required: true
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: weekly-scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas

      - name: Resolve scorecard parameters
        id: params
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "LOOKBACK_DAYS=${{ github.event.inputs.lookback_days }}" >> "$GITHUB_ENV"
            echo "STARTING_CAPITAL=${{ github.event.inputs.starting_capital }}" >> "$GITHUB_ENV"
            echo "MIN_CLOSED_TRADES=${{ github.event.inputs.min_closed_trades }}" >> "$GITHUB_ENV"
            echo "MIN_WIN_RATE=${{ github.event.inputs.min_win_rate }}" >> "$GITHUB_ENV"
            echo "MIN_PROFIT_FACTOR=${{ github.event.inputs.min_profit_factor }}" >> "$GITHUB_ENV"
            echo "MIN_AVG_PNL=${{ github.event.inputs.min_avg_pnl }}" >> "$GITHUB_ENV"
            echo "MAX_DRAWDOWN_PCT=${{ github.event.inputs.max_drawdown_pct }}" >> "$GITHUB_ENV"
            echo "FAIL_ON_HOLD=${{ github.event.inputs.fail_on_hold }}" >> "$GITHUB_ENV"
            echo "FAIL_ON_NOGO=${{ github.event.inputs.fail_on_nogo }}" >> "$GITHUB_ENV"
          else
            echo "LOOKBACK_DAYS=7" >> "$GITHUB_ENV"
            echo "STARTING_CAPITAL=20" >> "$GITHUB_ENV"
            echo "MIN_CLOSED_TRADES=200" >> "$GITHUB_ENV"
            echo "MIN_WIN_RATE=45" >> "$GITHUB_ENV"
            echo "MIN_PROFIT_FACTOR=1.2" >> "$GITHUB_ENV"
            echo "MIN_AVG_PNL=0.0" >> "$GITHUB_ENV"
            echo "MAX_DRAWDOWN_PCT=10" >> "$GITHUB_ENV"
            echo "FAIL_ON_HOLD=false" >> "$GITHUB_ENV"
            echo "FAIL_ON_NOGO=true" >> "$GITHUB_ENV"
          fi

      - name: Run weekly scorecard
        id: scorecard
        shell: bash
        run: |
          set +e
          bash scripts/run_weekly_scorecard.sh
          rc=$?
          primary_reason=""

          if [[ $rc -eq 0 ]]; then
            verdict="GO"
          elif [[ $rc -eq 2 ]]; then
            verdict="HOLD"
          elif [[ $rc -eq 3 ]]; then
            verdict="NO-GO"
          else
            verdict="ERROR"
          fi

          if [[ -f results/scorecards/latest_scorecard.txt ]]; then
            primary_reason="$(awk '/^Reason\(s\):/{in_reasons=1; next} in_reasons && /^- /{sub(/^- /, "", $0); print; exit} in_reasons && NF==0{exit}' results/scorecards/latest_scorecard.txt)"
          fi

          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
          {
            echo "primary_reason<<EOF"
            echo "$primary_reason"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Weekly Scorecard"
            echo
            echo "- Verdict: $verdict"
            echo "- Exit code: $rc"
            if [[ -n "$primary_reason" ]]; then
              echo "- Primary reason: $primary_reason"
            fi
            echo "- Report path: results/scorecards/latest_scorecard.txt"
          } >> "$GITHUB_STEP_SUMMARY"

          # Keep workflow running to upload artifacts and evaluate policy in next step.
          exit 0

      - name: Upload scorecard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-scorecard-${{ github.run_number }}
          path: results/scorecards/
          if-no-files-found: warn

      - name: Enforce verdict policy
        shell: bash
        run: |
          set -euo pipefail
          rc="${{ steps.scorecard.outputs.exit_code }}"
          verdict="${{ steps.scorecard.outputs.verdict }}"
          fail_on_hold="${FAIL_ON_HOLD}"
          fail_on_nogo="${FAIL_ON_NOGO}"

          # Unexpected script errors should always fail the workflow.
          if [[ "$rc" != "0" && "$rc" != "2" && "$rc" != "3" ]]; then
            echo "Scorecard execution failed unexpectedly with exit code: $rc"
            exit 1
          fi

          if [[ "$verdict" == "HOLD" && "$fail_on_hold" == "true" ]]; then
            echo "Failing workflow because verdict is HOLD and fail_on_hold=true"
            exit 1
          fi

          if [[ "$verdict" == "NO-GO" && "$fail_on_nogo" == "true" ]]; then
            echo "Failing workflow because verdict is NO-GO and fail_on_nogo=true"
            exit 1
          fi

          echo "Workflow policy passed (verdict=$verdict, exit_code=$rc)."