global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "trading_node_exporter"
    static_configs:
      - targets: ["localhost:9100"]

rule_files:
  - /etc/prometheus/rules/trading-alerts.yml
